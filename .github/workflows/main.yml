name: Build NtCall64

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build NtCall64
        working-directory: ./Source/NtCall64
        run: msbuild wfuzzer.vcxproj /m /p:Platform=${{ env.PLATFORM }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:PlatformToolset=v143

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Package\Application | Out-Null
          $outputDir = "Source\NtCall64\output\${{ env.PLATFORM }}\${{ env.BUILD_CONFIGURATION }}"
          $sourceDir = "Source\NtCall64"

          if (!(Test-Path "$outputDir\NtCall64.exe")) {
            throw "NtCall64.exe not found in $outputDir"
          }

          if (!(Test-Path "$sourceDir\badcalls.ini")) {
            throw "badcalls.ini not found in $sourceDir"
          }

          Copy-Item "$outputDir\NtCall64.exe" "Package\Application\ntcall64.exe" -Force
          Copy-Item "$sourceDir\badcalls.ini" "Package\Application\badcalls.ini" -Force

      - name: Upload ntcall64 snapshot
        uses: actions/upload-artifact@v6
        with:
          name: ntcall64_snapshot.zip
          path: Package\Application\*
